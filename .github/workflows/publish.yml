name: Publish Flutter web-only image

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - versions.env
      - .github/workflows/publish.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: solvro/flutter-web-only

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Load versions
        id: versions
        shell: bash
        run: |
          set -a
          source versions.env
          set +a
          echo "flutter=$FLUTTER_STABLE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Resolve image name
        id: image
        shell: bash
        run: |
          echo "name=${REGISTRY}/${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]' >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: |
            FLUTTER_STABLE_VERSION=${{ steps.versions.outputs.flutter }}
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.versions.outputs.flutter }}
